name: Update README with a CS Quote

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write # 👈 Fixes Git Push permissions

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated to latest stable v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Select a Random Quote from File
        id: select_quote
        run: |
          # Count total quotes
          TOTAL_QUOTES=$(jq 'length' quotes.json)
          echo "Total Quotes: $TOTAL_QUOTES"

          # Generate a random index
          RANDOM_INDEX=$((RANDOM % TOTAL_QUOTES))
          echo "Random Index Selected: $RANDOM_INDEX"

          # Extract text and author safely
          TEXT=$(jq -r ".[$RANDOM_INDEX].text" quotes.json)
          AUTHOR=$(jq -r ".[$RANDOM_INDEX].author" quotes.json)
          
          # Combine them into a clean string
          FULL_QUOTE=" - 💡 Computer Science Quote: \"$TEXT\" — $AUTHOR"
          
          # Save to a file for the next step
          echo "$FULL_QUOTE" > quote.txt

      - name: Update README
        run: |
          # Read the quote into a safe environment variable
          QUOTE_CONTENT=$(cat quote.txt)
          
          # Use Node.js/Python or standard bash to safely replace without breaking on special characters
          # This replaces the tag but keeps the tag alive for the next day's run!
          export QUOTE_CONTENT
          node -e '
            const fs = require("fs");
            let readme = fs.readFileSync("README.md", "utf8");
            const updated = readme.replace(/<!-- CS_QUOTE -->([\s\S]*?)<!-- CS_QUOTE_END -->/g, `<!-- CS_QUOTE -->\n${process.env.QUOTE_CONTENT}\n<!-- CS_QUOTE_END -->`);
            fs.writeFileSync("README.md", updated);
          '

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Updated CS Quote" || echo "No changes to commit"
          git push
